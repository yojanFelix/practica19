<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC Femenino - Johan Alberto</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdf2f8; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 400px; border-top: 5px solid #d63384; }
        h2 { color: #d63384; text-align: center; margin-bottom: 5px; }
        .user-info { text-align: center; font-size: 0.8em; color: #666; margin-bottom: 20px; }
        
        label { display: block; margin-top: 15px; font-weight: bold; color: #444; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ffc1e3; border-radius: 8px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #d63384; box-shadow: 0 0 5px rgba(214, 51, 132, 0.2); }
        
        button { 
            width: 100%; background-color: #d63384; color: white; border: none; 
            padding: 14px; margin-top: 25px; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: 0.3s;
        }
        button:hover { background-color: #b92a6e; }
        
        #resultado-panel { 
            margin-top: 25px; padding: 20px; border-radius: 10px; text-align: center; display: none;
            animation: fadeIn 0.5s;
        }
        .imc-valor { font-size: 2em; font-weight: bold; display: block; margin: 10px 0; }
        .imc-estado { font-size: 1.2em; font-weight: bold; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <h2>Calculadora de IMC</h2>
    <div class="user-info">
        <strong>Johan Alberto Quiñonez Felix</strong><br>
        Cuenta: 20029012 | FIM UAS
    </div>

    <label for="peso">Peso (kg):</label>
    <input type="number" id="peso" step="0.1" placeholder="Ej: 60.5">

    <label for="altura">Estatura (metros):</label>
    <input type="number" id="altura" step="0.01" placeholder="Ej: 1.65">

    <button onclick="calcularIMC()">Calcular Índice</button>

    <div id="resultado-panel">
        <span>Tu IMC es:</span>
        <span id="valor-imc" class="imc-valor"></span>
        <span id="estado-imc" class="imc-estado"></span>
    </div>
</div>

<script>
    function calcularIMC() {
        const peso = parseFloat(document.getElementById("peso").value);
        const altura = parseFloat(document.getElementById("altura").value);
        const panel = document.getElementById("resultado-panel");
        const vIMC = document.getElementById("valor-imc");
        const eIMC = document.getElementById("estado-imc");

        if (!peso || !altura || altura <= 0) {
            alert("Por favor, ingresa valores válidos.");
            return;
        }

        // Fórmula: IMC = peso / (altura * altura)
        const imc = peso / (altura ** 2);
        
        // Mostrar panel
        panel.style.display = "block";
        vIMC.innerText = imc.toFixed(2);

        // Clasificación según la OMS
        let estado = "";
        let color = "";

        if (imc < 18.5) {
            estado = "Bajo peso";
            color = "#17a2b8"; // Azul
        } else if (imc >= 18.5 && imc <= 24.9) {
            estado = "Peso Normal";
            color = "#28a745"; // Verde
        } else if (imc >= 25 && imc <= 29.9) {
            estado = "Sobrepeso";
            color = "#ffc107"; // Amarillo/Naranja
        } else if (imc >= 30 && imc <= 34.9) {
            estado = "Obesidad Grado I";
            color = "#fd7e14"; // Naranja fuerte
        } else if (imc >= 35 && imc <= 39.9) {
            estado = "Obesidad Grado II";
            color = "#dc3545"; // Rojo
        } else {
            estado = "Obesidad Grado III (Mórbida)";
            color = "#880808"; // Rojo oscuro
        }

        eIMC.innerText = estado;
        panel.style.backgroundColor = color + "22"; // Fondo suave del color
        panel.style.border = `1px solid ${color}`;
        eIMC.style.color = color;

        // Auditoría en consola para Johan
        console.log(`--- Reporte IMC ---`);
        console.log(`Usuario: 20029012`);
        console.log(`Peso: ${peso}kg | Altura: ${altura}m`);
        console.log(`Resultado: ${imc.toFixed(2)} (${estado})`);
    }
</script>

</body>
</html>
